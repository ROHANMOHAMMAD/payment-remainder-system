version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: payment-system-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payment_system
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    networks:
      - payment-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: payment-system-redis
    ports:
      - "6379:6379"
    networks:
      - payment-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: payment-system-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/payment_system
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: payment_system
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_jwt_secret_change_in_production
      FRONTEND_URL: http://localhost:3000
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    networks:
      - payment-network

  # Frontend
  frontend:
    image: node:18-alpine
    container_name: payment-system-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: node -e "import http from 'http'; import fs from 'fs'; const server = http.createServer((req, res) => { const filePath = req.url === '/' ? './index.html' : '.' + req.url; const ext = filePath.split('.').pop(); const mimeTypes = { html: 'text/html', css: 'text/css', js: 'text/javascript', json: 'application/json' }; fs.readFile(filePath, (err, data) => { if (err) { res.writeHead(404); res.end('Not found'); } else { res.writeHead(200, { 'Content-Type': mimeTypes[ext] || 'text/plain' }); res.end(data); } }); }); server.listen(3000, () => console.log('Frontend running on http://localhost:3000')); "
    networks:
      - payment-network

volumes:
  postgres_data:

networks:
  payment-network:
    driver: bridge
